<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IELTS Assessment & Recent Tests</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #077FFF;
      --primary-hover: #0066cc;
      --bg: #F8FAFC;
      --card-bg: #FFFFFF;
      --text-main: #1E293B;
      --text-muted: #64748B;
      --border: #E2E8F0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'DM Sans', sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 1000px;
      padding: 40px 20px 30px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.5px;
    }

    .toggle-container {
      position: relative;
      display: flex;
      background: var(--card-bg);
      padding: 6px;
      border-radius: 50px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border);
      width: 400px;
      max-width: 100%;
    }

    .toggle-slider {
      position: absolute;
      top: 6px;
      left: 6px;
      width: calc(50% - 6px);
      height: calc(100% - 12px);
      background-color: var(--primary);
      border-radius: 40px;
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      z-index: 1;
    }

    .toggle-btn {
      flex: 1;
      padding: 12px 0;
      font-size: 15px;
      font-weight: 600;
      border: none;
      background: transparent;
      cursor: pointer;
      z-index: 2;
      color: var(--text-muted);
      transition: color 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }

    .toggle-btn.active {
      color: #fff;
    }

    .check-icon {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    main {
      width: 100%;
      max-width: 1000px;
      padding: 0 20px 40px;
      flex: 1;
    }

    .view-section {
      display: none;
      animation: fadeIn 0.4s ease-in-out;
    }
    .view-section.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .section-header h2 {
      font-size: 22px;
      font-weight: 700;
    }

    .month-badge {
      background: rgba(7, 127, 255, 0.1);
      color: var(--primary);
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 14px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .test-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      gap: 10px;
      justify-content: space-between;
      min-height: 130px;
    }

    .test-card:hover {
      transform: translateY(-4px);
      border-color: var(--primary);
      box-shadow: 0 12px 24px rgba(7, 127, 255, 0.08);
    }

    .card-tag {
      font-size: 11px;
      color: var(--primary);
      background: rgba(7, 127, 255, 0.08);
      padding: 4px 8px;
      border-radius: 6px;
      width: fit-content;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text-main);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .back-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--primary); }

    .word-count-badge {
      display: inline-flex;
      align-items: center;
      margin-top: 12px;
      background: #f1f5f9;
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
    }

    .input-group { margin-bottom: 24px; }
    .input-group label {
      display: block;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--text-main);
      font-size: 16px;
    }
    textarea {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-main);
      resize: vertical;
      transition: border-color 0.3s;
      outline: none;
    }
    textarea:focus { border-color: var(--primary); }
    
    textarea[readonly] {
      background-color: #F8FAFC;
      color: var(--text-muted);
      cursor: not-allowed;
      resize: none;
    }
    textarea[readonly]:focus {
      border-color: var(--border);
    }

    .eval-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: background 0.3s;
      margin-top: 10px;
    }
    .eval-btn:hover { background: var(--primary-hover); }
    .eval-btn:disabled {
      background: var(--text-muted);
      cursor: not-allowed;
    }

    .result-container {
      margin-top: 30px;
      padding: 24px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      display: none;
      animation: fadeIn 0.4s ease;
      line-height: 1.6;
    }
    .result-container h3 { margin-bottom: 16px; font-size: 20px; border-bottom: 2px solid var(--border); padding-bottom: 8px;}

    @media (max-width: 768px) {
      .cards-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .cards-grid { grid-template-columns: 1fr; }
      .toggle-container { width: 100%; }
      .toggle-btn { font-size: 14px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>IELTS Assessment</h1>
    <div class="toggle-container">
      <div class="toggle-slider" id="toggleSlider"></div>
      <button class="toggle-btn active" id="btnRecent" onclick="switchTab('recent')">
        <svg class="check-icon" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        Recent Tests
      </button>
      <button class="toggle-btn" id="btnEvaluate" onclick="switchTab('evaluate')">
        Evaluate My Essay!
      </button>
    </div>
  </header>

  <main>
    <section id="view-recent" class="view-section active">
      <div class="section-header">
        <h2>Recent Tests</h2>
        <span class="month-badge">May, 2026</span>
      </div>
      <div class="cards-grid" id="cardsContainer">
        </div>
    </section>

    <section id="view-detail" class="view-section">
      <button class="back-btn" onclick="goBackToRecent()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Back to Recent Tests
      </button>
      
      <div class="input-group">
        <label>Task Prompt / Topic</label>
        <textarea id="detailTopic" rows="3" readonly></textarea>
      </div>

      <div class="input-group">
        <label>Your Essay</label>
        <textarea id="detailAnswer" rows="10" placeholder="Type or paste your essay for this selected topic here..." oninput="updateDetailWordCount()"></textarea>
        <div class="word-count-badge" id="detailWordCount">0 words</div>
      </div>
      
      <button class="eval-btn" id="detailEvalBtn" onclick="submitDetailEvaluation()">Evaluate Essay</button>
      
      <div class="result-container" id="detailResultBox">
        <h3>AI Feedback</h3>
        <div id="detailResultText"></div>
      </div>
    </section>

    <section id="view-evaluate" class="view-section">
      <div class="input-group">
        <label>Task Prompt / Topic</label>
        <textarea id="evalTopic" rows="3" placeholder="Enter the IELTS Writing Task 2 prompt here..."></textarea>
      </div>
      <div class="input-group">
        <label>Your Essay</label>
        <textarea id="evalEssay" rows="10" placeholder="Type or paste your essay here..." oninput="updateEvalWordCount()"></textarea>
        <div class="word-count-badge" id="evalWordCountCounter">0 words</div>
      </div>
      <button class="eval-btn" id="evalBtn" onclick="submitEvaluation()">Evaluate Essay</button>
      
      <div class="result-container" id="evalResultBox">
        <h3>AI Feedback</h3>
        <div id="evalResultText"></div>
      </div>
    </section>
  </main>

  <script>
    // === База данных топиков MAY 2026 ===
    const recentTests = [
      { tag: "Task 2 • Agree/Disagree", prompt: "Some people think that the government should spend money on children to take part in sport and art classes in schools, while others think they should spend on professional sports events and public art performances. To what extent do you agree or disagree?" },
      { tag: "Task 2 • Discuss Both Views", prompt: "Scientists agree that people are damaging their health by eating too much junk food. Some people think that the answer to this problem is to educate people. Others think education will not work. Discuss both views and give your own opinion." },
      { tag: "Task 2 • Agree/Disagree", prompt: "Some people believe that scientific research done today is a waste of time and money. To what extent do you agree or disagree?" },
      { tag: "Task 2 • Direct Question", prompt: "In today's world of advanced science and technology, we still greatly value our artists such as musicians, painters and writers. What can arts tell us about life that science and technology cannot?" },
      { tag: "Task 2 • Agree/Disagree", prompt: "The older generations tend to have very traditional ideas about how people should live, think and behave. However, some people believe that these ideas are not helpful in preparing younger generations for modern life. To what extent do you agree or disagree with this view?" },
      { tag: "Task 2 • Causes & Solutions", prompt: "Scientists tell us some activities are good for health and others are bad. Despite knowing that, millions of people continue doing unhealthy activities. What are the causes and what are the solutions?" },
      { tag: "Task 2 • Discuss Both Views", prompt: "Some people believe that studying at university or college is the best route to a successful career, while others believe that it is better to get a job straight after school. Discuss both views and give your opinion." },
      { tag: "Task 2 • Positive/Negative", prompt: "More and more people today are spending large amounts of money on their appearance in order to look younger. Why do people want to look younger? Do you think this is a positive or negative development?" }
    ];

    // === Генерация маленьких карточек ===
    const container = document.getElementById('cardsContainer');
    recentTests.forEach((test, index) => {
      const card = document.createElement('div');
      card.className = 'test-card';
      
      let shortPrompt = test.prompt;
      if(shortPrompt.length > 75) {
        shortPrompt = shortPrompt.substring(0, 72) + "...";
      }

      card.innerHTML = `
        <span class="card-tag">${test.tag}</span>
        <h3 class="card-title">${shortPrompt}</h3>
      `;
      card.onclick = () => openTestDetail(index);
      container.appendChild(card);
    });

    // === Живые счетчики слов ===
    function updateEvalWordCount() {
      const text = document.getElementById('evalEssay').value.trim();
      const words = text ? text.split(/\s+/).length : 0; 
      document.getElementById('evalWordCountCounter').innerText = `${words} words`;
    }

    function updateDetailWordCount() {
      const text = document.getElementById('detailAnswer').value.trim();
      const words = text ? text.split(/\s+/).length : 0; 
      document.getElementById('detailWordCount').innerText = `${words} words`;
    }

    // === Переключение вкладок ===
    function switchTab(tabName) {
      const btnRecent = document.getElementById('btnRecent');
      const btnEvaluate = document.getElementById('btnEvaluate');
      const slider = document.getElementById('toggleSlider');

      if (tabName === 'recent') {
        btnRecent.classList.add('active');
        btnEvaluate.classList.remove('active');
        slider.style.transform = 'translateX(0)';
        showSection('view-recent');
      } else {
        btnEvaluate.classList.add('active');
        btnRecent.classList.remove('active');
        slider.style.transform = 'translateX(100%)';
        showSection('view-evaluate');
      }
    }

    function showSection(sectionId) {
      document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
      document.getElementById(sectionId).classList.add('active');
    }

    // === Страница деталей архивного топика ===
    function openTestDetail(index) {
      const test = recentTests[index];
      
      document.getElementById('detailTopic').value = test.prompt;
      document.getElementById('detailAnswer').value = "";
      document.getElementById('detailResultBox').style.display = "none";
      updateDetailWordCount();

      showSection('view-detail');
    }

    function goBackToRecent() {
      showSection('view-recent');
    }

    // === Красивое форматирование JSON-объекта от Gemini ===
    function formatAIResponse(data) {
      let html = "";
      for (const [key, value] of Object.entries(data)) {
        // Делаем красивые заголовки из CamelCase (например, overallBand -> Overall Band)
        const formattedKey = key
          .replace(/([A-Z])/g, ' $1')
          .replace(/^./, str => str.toUpperCase());
          
        if (typeof value === 'object' && value !== null) {
          html += `<div style="margin-bottom: 16px;"><strong style="color: var(--text-main); font-size: 16px;">${formattedKey}:</strong>`;
          html += `<ul style="margin-left: 20px; margin-top: 6px; color: var(--text-muted);">`;
          for (const [subKey, subValue] of Object.entries(value)) {
            html += `<li style="margin-bottom: 4px;"><strong>${subKey}:</strong> ${subValue}</li>`;
          }
          html += `</ul></div>`;
        } else {
          html += `<p style="margin-bottom: 14px; color: var(--text-muted);"><strong style="color: var(--text-main);">${formattedKey}:</strong> ${value}</p>`;
        }
      }
      return html;
    }

    // === Отправка запроса на бэкенд (Полностью синхронизировано!) ===
    async function sendToAIServer(topic, essay, btnElement, resultBoxId, resultTextId) {
      if(!topic.trim() || !essay.trim()) {
        alert("Please make sure both fields are filled out!");
        return;
      }

      btnElement.innerText = "Evaluating...";
      btnElement.disabled = true;

      const resBox = document.getElementById(resultBoxId);
      const resText = document.getElementById(resultTextId);
      resBox.style.display = "none";

      try {
        // Отправляем тело ровно так, как ждет твой destructuring: const { taskPrompt, essay } = req.body;
        const response = await fetch("/evaluate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ 
            taskPrompt: topic, 
            essay: essay 
          })
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.error || "Oops! Too many requests, wait for some time..");
        }

        const data = await response.json();
        
        // Рендерим структурированный JSON ответ красиво
        if (typeof data === 'object' && data !== null) {
          resText.innerHTML = formatAIResponse(data);
        } else {
          resText.innerText = data;
        }
        
        resBox.style.display = "block";

      } catch (err) {
        console.error(err);
        alert(err.message || "Oops! Too many requests, wait for some time..");
      } finally {
        btnElement.innerText = "Evaluate Essay";
        btnElement.disabled = false;
      }
    }

    // === Обработчики кнопок отправки ===
    function submitDetailEvaluation() {
      const topic = document.getElementById('detailTopic').value;
      const essay = document.getElementById('detailAnswer').value;
      const btn = document.getElementById('detailEvalBtn');
      
      sendToAIServer(topic, essay, btn, 'detailResultBox', 'detailResultText');
    }

    function submitEvaluation() {
      const topic = document.getElementById('evalTopic').value;
      const essay = document.getElementById('evalEssay').value;
      const btn = document.getElementById('evalBtn');
      
      sendToAIServer(topic, essay, btn, 'evalResultBox', 'evalResultText');
    }
  </script>
</body>
</html>
