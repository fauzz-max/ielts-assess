<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ielts-assess</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'DM Sans', sans-serif;
}

body {
    background: #ffffff;
    color: #007FFF;
    padding-bottom: 60px;
}

/* Main Container */
.container {
    max-width: 800px;
    margin: auto;
    padding: 40px 20px;
}

.header {
    text-align: center;
    margin-bottom: 50px;
    animation: fadeInDown 0.8s ease-out;
}

.header h1 {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -1px;
}

.header p {
    color: rgba(0, 127, 255, 0.6);
    font-weight: 500;
    margin-top: 8px;
    font-size: 18px;
}

/* Inputs */
.input-section {
    animation: fadeIn 1s ease-out;
}

.input-group {
    margin-bottom: 24px;
}

.input-group label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(0, 127, 255, 0.7);
    margin-bottom: 8px;
}

textarea {
    width: 100%;
    background: transparent;
    border: 1px solid rgba(0, 127, 255, 0.2);
    border-radius: 16px;
    padding: 18px;
    font-size: 16px;
    color: #007FFF;
    outline: none;
    transition: all 0.3s ease;
    resize: vertical;
}

textarea:focus {
    border-color: #007FFF;
    box-shadow: 0 0 0 4px rgba(0, 127, 255, 0.1);
}

textarea::placeholder {
    color: rgba(0, 127, 255, 0.3);
}

/* Button */
.btn {
    background: #007FFF;
    color: #ffffff;
    border: none;
    padding: 16px 32px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s ease;
    width: 100%;
}

.btn:hover {
    background: #005bb5;
    transform: translateY(-2px);
    box-shadow: 0 8px 16px rgba(0, 127, 255, 0.2);
}

.btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}

/* Modal Overlay (Background Blur) */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* Полупрозрачный белый фон с размытием заднего плана */
    background: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    
    z-index: 100;
    display: flex;
    align-items: flex-start;
    overflow-y: auto;
    padding: 40px 20px;
    
    /* Анимация скрытия/появления */
    opacity: 0;
    visibility: hidden;
    transition: all 0.4s ease;
}

.modal-overlay.active {
    opacity: 1;
    visibility: visible;
}

/* Big Results Card */
.results-card {
    background: #ffffff;
    width: 100%;
    max-width: 800px;
    margin: auto; /* Помогает центрировать по вертикали и горизонтали */
    border-radius: 32px;
    padding: 50px;
    /* Красивая мягкая тень от самой карточки */
    box-shadow: 0 24px 60px rgba(0, 127, 255, 0.15);
    border: 1px solid rgba(0, 127, 255, 0.1);
    position: relative;
    
    /* Анимация выезда снизу вверх */
    transform: translateY(40px) scale(0.98);
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

.modal-overlay.active .results-card {
    transform: translateY(0) scale(1);
}

.close-btn {
    position: absolute;
    top: 30px;
    right: 30px;
    background: rgba(0, 127, 255, 0.08);
    color: #007FFF;
    border: none;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.close-btn:hover {
    background: #007FFF;
    color: #fff;
    transform: scale(1.05);
}

/* Results Content Formatting */
.score-banner {
    display: flex;
    align-items: center;
    gap: 30px;
    margin-bottom: 40px;
    padding-bottom: 30px;
    border-bottom: 1px solid rgba(0, 127, 255, 0.1);
    margin-top: 20px;
}

.overall-circle {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 4px solid #007FFF;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    font-weight: 700;
    flex-shrink: 0;
    box-shadow: 0 10px 20px rgba(0, 127, 255, 0.1);
}

.score-text h2 {
    font-size: 26px;
    margin-bottom: 10px;
}

.score-text p {
    color: rgba(0, 127, 255, 0.8);
    line-height: 1.6;
    font-size: 16px;
}

.criteria-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 40px;
}

.criterion-card {
    border: 1px solid rgba(0, 127, 255, 0.15);
    padding: 24px;
    border-radius: 20px;
    background: #ffffff;
    transition: transform 0.2s ease;
}

.criterion-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0, 127, 255, 0.08);
}

.criterion-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}

.criterion-header h3 {
    font-size: 16px;
    font-weight: 600;
}

.criterion-score {
    background: rgba(0, 127, 255, 0.1);
    padding: 4px 12px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 14px;
}

.criterion-card p {
    font-size: 14px;
    color: rgba(0, 127, 255, 0.7);
    line-height: 1.6;
}

.action-plan {
    background: rgba(0, 127, 255, 0.05);
    padding: 30px;
    border-radius: 24px;
}

.action-plan h3 {
    margin-bottom: 16px;
    font-size: 20px;
}

.action-plan ul {
    list-style: none;
}

.action-plan li {
    position: relative;
    padding-left: 24px;
    margin-bottom: 12px;
    color: rgba(0, 127, 255, 0.8);
    line-height: 1.5;
}

.action-plan li::before {
    content: "→";
    position: absolute;
    left: 0;
    color: #007FFF;
    font-weight: bold;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 600px) {
    .criteria-grid { grid-template-columns: 1fr; }
    .score-banner { flex-direction: column; text-align: center; }
    .results-card { padding: 30px 20px; }
}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>IELTS Assess</h1>
        <p>Strict grading. Precise feedback. Zero fluctuations.</p>
    </div>

    <div class="input-section">
        <div class="input-group">
            <label>Task Prompt (Writing Task 2)</label>
            <textarea id="promptInput" rows="3" placeholder="Paste the IELTS Writing Task 2 question here..."></textarea>
        </div>

        <div class="input-group">
            <label>
                Your Essay
                <span id="wordCount" style="font-weight: 500;">0 words</span>
            </label>
            <textarea id="essayInput" rows="12" placeholder="Start writing your essay here..."></textarea>
        </div>

        <button class="btn" id="evalBtn" onclick="evaluateEssay()">Evaluate Essay</button>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="results-card">
        <button class="close-btn" onclick="closeModal()">✕</button>
        
        <div id="resultsContent">
            </div>
    </div>
</div>

<script>
    // Live Word Counter
    document.getElementById('essayInput').addEventListener('input', function(e) {
        const text = e.target.value.trim();
        const words = text ? text.split(/\s+/).length : 0;
        const countSpan = document.getElementById('wordCount');
        countSpan.innerText = `${words} words`;
        countSpan.style.color = words < 250 ? '#ff4d4d' : 'rgba(0, 127, 255, 0.7)';
    });

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('active');
        // Опционально возвращаем скролл наверх страницы, если хочется
        // window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function evaluateEssay() {
        const promptText = document.getElementById('promptInput').value.trim();
        const essayText = document.getElementById('essayInput').value.trim();
        const btn = document.getElementById('evalBtn');
        if (btn.disabled) return;
        const modal = document.getElementById('modalOverlay');
        const resultsContent = document.getElementById('resultsContent');

        if (!essayText) {
            alert("Please write an essay first.");
            return;
        }

        btn.innerText = "Analyzing...";
        btn.disabled = true;

        try {
            const res = await fetch("/evaluate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ taskPrompt: promptText, essay: essayText })
            });

            if (!res.ok) throw new Error("Evaluation failed");

            const data = await res.json();

            // Build HTML from JSON
            let criteriaHtml = '';
            data.criteria.forEach(c => {
                criteriaHtml += `
                    <div class="criterion-card">
                        <div class="criterion-header">
                            <h3>${c.name}</h3>
                            <div class="criterion-score">${Number(c.score).toFixed(1)}</div>
                        </div>
                        <p>${c.feedback}</p>
                    </div>
                `;
            });

            let improvementsHtml = '';
            data.improvements.forEach(imp => {
                improvementsHtml += `<li>${imp}</li>`;
            });

            resultsContent.innerHTML = `
                <div class="score-banner">
                    <div class="overall-circle">${Number(data.overallScore).toFixed(1)}</div>
                    <div class="score-text">
                        <h2>Overall Assessment</h2>
                        <p>${data.summary}</p>
                    </div>
                </div>
                <div class="criteria-grid">
                    ${criteriaHtml}
                </div>
                <div class="action-plan">
                    <h3>Action Plan for Improvement</h3>
                    <ul>${improvementsHtml}</ul>
                </div>
            `;

            // Показываем модалку с блюром
            modal.classList.add('active');

} catch (err) {
    console.error(err);
    

    const errorMessage = err.message || "Oops! Too many requests, wait for some time..";
    

    alert(errorMessage); 
    
} finally {
    btn.innerText = "Evaluate Essay";
    btn.disabled = false;
}
    }

    // Закрытие по клику вне карточки (по блюр-фону)
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
        if (e.target === this) {
            closeModal();
        }
    });
</script>

</body>
</html>
