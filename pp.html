<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IELTS Assessment & Recent Tests</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #077FFF;
      --primary-hover: #0066cc;
      --bg: #F8FAFC;
      --card-bg: #FFFFFF;
      --text-main: #1E293B;
      --text-muted: #64748B;
      --border: #E2E8F0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'DM Sans', sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 1000px;
      padding: 40px 20px 30px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.5px;
    }

    .toggle-container {
      position: relative;
      display: flex;
      background: var(--card-bg);
      padding: 6px;
      border-radius: 50px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border);
      width: 400px;
      max-width: 100%;
    }

    .toggle-slider {
      position: absolute;
      top: 6px;
      left: 6px;
      width: calc(50% - 6px);
      height: calc(100% - 12px);
      background-color: var(--primary);
      border-radius: 40px;
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      z-index: 1;
    }

    .toggle-btn {
      flex: 1;
      padding: 12px 0;
      font-size: 15px;
      font-weight: 600;
      border: none;
      background: transparent;
      cursor: pointer;
      z-index: 2;
      color: var(--text-muted);
      transition: color 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }

    .toggle-btn.active {
      color: #fff;
    }

    .check-icon {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    main {
      width: 100%;
      max-width: 1000px;
      padding: 0 20px 40px;
      flex: 1;
    }

    .view-section {
      display: none;
      animation: fadeIn 0.4s ease-in-out;
    }
    .view-section.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .section-header h2 {
      font-size: 22px;
      font-weight: 700;
    }

    .month-badge {
      background: rgba(7, 127, 255, 0.1);
      color: var(--primary);
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 14px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .test-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .test-card:hover {
      transform: translateY(-4px);
      border-color: var(--primary);
      box-shadow: 0 12px 24px rgba(7, 127, 255, 0.1);
    }

    .card-tag {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.4;
    }

    .back-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--primary); }

    .word-count-badge {
      display: inline-flex;
      align-items: center;
      margin-top: 12px;
      background: #f1f5f9;
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
    }

    /* === Стили для инпутов (Одинаковые для обоих режимов) === */
    .input-group { margin-bottom: 24px; }
    .input-group label {
      display: block;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--text-main);
      font-size: 16px;
    }
    textarea {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-main);
      resize: vertical;
      transition: border-color 0.3s;
      outline: none;
    }
    textarea:focus { border-color: var(--primary); }
    
    /* Специфичные стили для полей "только для чтения" */
    textarea[readonly] {
      background-color: var(--card-bg);
      cursor: default;
      resize: none;
    }
    textarea[readonly]:focus {
      border-color: var(--border);
    }

    .eval-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: background 0.3s;
      margin-top: 10px;
    }
    .eval-btn:hover { background: var(--primary-hover); }

    @media (max-width: 768px) {
      .cards-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .cards-grid { grid-template-columns: 1fr; }
      .toggle-container { width: 100%; }
      .toggle-btn { font-size: 14px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>IELTS Assessment</h1>
    <div class="toggle-container">
      <div class="toggle-slider" id="toggleSlider"></div>
      <button class="toggle-btn active" id="btnRecent" onclick="switchTab('recent')">
        <svg class="check-icon" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        Recent Tests
      </button>
      <button class="toggle-btn" id="btnEvaluate" onclick="switchTab('evaluate')">
        Evaluate My Essay!
      </button>
    </div>
  </header>

  <main>
    <!-- Вкладка: Recent Tests -->
    <section id="view-recent" class="view-section active">
      <div class="section-header">
        <h2>Recent Tests</h2>
        <span class="month-badge">May, 2026</span>
      </div>
      <div class="cards-grid" id="cardsContainer">
        <!-- Карточки генерируются через JS -->
      </div>
    </section>

    <!-- Детальный просмотр выбранного теста (Теперь полностью повторяет структуру Evaluate) -->
    <section id="view-detail" class="view-section">
      <button class="back-btn" onclick="goBackToRecent()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Back to Recent Tests
      </button>
      
      <div class="input-group">
        <label>Task Prompt / Topic</label>
        <textarea id="detailTopic" rows="3" readonly></textarea>
      </div>

      <div class="input-group">
        <label>Your Essay</label>
        <textarea id="detailAnswer" rows="10" readonly></textarea>
        <div class="word-count-badge" id="detailWordCount">0 words</div>
      </div>
    </section>

    <!-- Вкладка: Evaluate My Essay -->
    <section id="view-evaluate" class="view-section">
      <div class="input-group">
        <label>Task Prompt / Topic</label>
        <textarea id="evalTopic" rows="3" placeholder="Enter the IELTS Writing Task 2 prompt here..."></textarea>
      </div>
      <div class="input-group">
        <label>Your Essay</label>
        <textarea id="evalEssay" rows="10" placeholder="Type or paste your essay here..." oninput="updateEvalWordCount()"></textarea>
        <div class="word-count-badge" id="evalWordCountCounter">0 words</div>
      </div>
      <button class="eval-btn" id="evalBtn" onclick="submitEvaluation()">Evaluate Essay</button>
    </section>
  </main>

  <script>
    // === База данных тестов (Пустые шаблоны для Task 2) ===
    const recentTests = [
      { tag: "Task 2", title: "Some people think that the government should spend money.. , while other think.. ", prompt: "Prompt for Test 1 will go here...", answer: "Sample answer for Test 1 will go here..." },
      { tag: "Task 2", title: "Test 2", prompt: "Prompt for Test 2 will go here...", answer: "Sample answer for Test 2 will go here..." },
      { tag: "Task 2", title: "Test 3", prompt: "Prompt for Test 3 will go here...", answer: "Sample answer for Test 3 will go here..." },
      { tag: "Task 2", title: "Test 4", prompt: "Prompt for Test 4 will go here...", answer: "Sample answer for Test 4 will go here..." },
      { tag: "Task 2", title: "Test 5", prompt: "Prompt for Test 5 will go here...", answer: "Sample answer for Test 5 will go here..." },
      { tag: "Task 2", title: "Test 6", prompt: "Prompt for Test 6 will go here...", answer: "Sample answer for Test 6 will go here..." },
      { tag: "Task 2", title: "Test 7", prompt: "Prompt for Test 7 will go here...", answer: "Sample answer for Test 7 will go here..." },
      { tag: "Task 2", title: "Test 8", prompt: "Prompt for Test 8 will go here...", answer: "Sample answer for Test 8 will go here..." }
    ];

    // === Отрисовка карточек при загрузке ===
    const container = document.getElementById('cardsContainer');
    recentTests.forEach((test, index) => {
      const card = document.createElement('div');
      card.className = 'test-card';
      card.innerHTML = `
        <span class="card-tag">${test.tag}</span>
        <h3 class="card-title">${test.title}</h3>
      `;
      card.onclick = () => openTestDetail(index);
      container.appendChild(card);
    });

    // === Динамический счетчик слов для окна Evaluate ===
    function updateEvalWordCount() {
      const text = document.getElementById('evalEssay').value.trim();
      const words = text ? text.split(/\s+/).length : 0; 
      document.getElementById('evalWordCountCounter').innerText = `${words} words`;
    }

    // === Логика переключения вкладок ===
    function switchTab(tabName) {
      const btnRecent = document.getElementById('btnRecent');
      const btnEvaluate = document.getElementById('btnEvaluate');
      const slider = document.getElementById('toggleSlider');

      if (tabName === 'recent') {
        btnRecent.classList.add('active');
        btnEvaluate.classList.remove('active');
        slider.style.transform = 'translateX(0)';
        showSection('view-recent');
      } else {
        btnEvaluate.classList.add('active');
        btnRecent.classList.remove('active');
        slider.style.transform = 'translateX(100%)';
        showSection('view-evaluate');
      }
    }

    function showSection(sectionId) {
      document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
      document.getElementById(sectionId).classList.add('active');
    }

    // === Логика детальной страницы теста ===
    function openTestDetail(index) {
      const test = recentTests[index];
      
      // Наполняем текстовые поля через .value вместо .innerText
      document.getElementById('detailTopic').value = test.prompt;
      document.getElementById('detailAnswer').value = test.answer;
      
      const words = test.answer.trim() ? test.answer.trim().split(/\s+/).length : 0;
      document.getElementById('detailWordCount').innerText = `${words} words`;

      showSection('view-detail');
    }

    function goBackToRecent() {
      showSection('view-recent');
    }

    // === Отправка эссе на оценку ===
    async function submitEvaluation() {
      const topic = document.getElementById('evalTopic').value;
      const essay = document.getElementById('evalEssay').value;
      
      if(!topic || !essay) {
        alert("Please fill in both the topic and the essay!");
        return;
      }
      
      const btn = document.getElementById('evalBtn');
      btn.innerText = "Evaluating...";
      btn.disabled = true;

      setTimeout(() => {
        btn.innerText = "Evaluate Essay";
        btn.disabled = false;
        alert("Успешно! Добавь сюда свой код для отображения ответа Gemini.");
      }, 1000);
    }
  </script>
</body>
</html>
